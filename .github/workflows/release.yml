name: Release Builds

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  build-linux:
    name: Build Linux Static Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
          - target: armv7-unknown-linux-musleabihf
            arch: armv7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build universal binary
        # Static musl, no REALITY (Go can't ride a static-musl binary). REALITY
        # ships as glibc via the `build-reality` job + the container image.
        run: cross build --release --target ${{ matrix.target }}

      - name: Create release artifacts
        run: |
          cd target/${{ matrix.target }}/release

          # The binary is a single multi-call executable; every tarball ships
          # it under the one name `2cha` (asset filenames disambiguate role).
          strip 2cha || true

          # Create tarballs — all contain the same `2cha` binary
          tar -czf 2cha-server-linux-${{ matrix.arch }}.tar.gz 2cha
          tar -czf 2cha-client-linux-${{ matrix.arch }}.tar.gz 2cha
          # NOTE: scripts/install.sh downloads these exact asset names — keep in sync
          tar -czf 2cha-universal-linux-${{ matrix.arch }}.tar.gz 2cha

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: 2cha-server-linux-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/2cha-server-linux-${{ matrix.arch }}.tar.gz

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: 2cha-client-linux-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/2cha-client-linux-${{ matrix.arch }}.tar.gz

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: 2cha-universal-linux-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/2cha-universal-linux-${{ matrix.arch }}.tar.gz

  # REALITY binaries — glibc (Go's runtime can't ride a static-musl binary).
  # Cross's gnu images target an older glibc, so the tarballs run on mainstream
  # server distros; NixOS/Alpine users take the container image below.
  build-reality:
    name: Build REALITY glibc binary (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            docker_arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            docker_arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build REALITY binary (glibc)
        run: cross build --release --target ${{ matrix.target }} -p twocha-cli --features reality
      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf 2cha-reality-linux-${{ matrix.arch }}.tar.gz 2cha
      - name: Upload reality tarball
        uses: actions/upload-artifact@v4
        with:
          name: 2cha-reality-linux-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/2cha-reality-linux-${{ matrix.arch }}.tar.gz
      - name: Upload raw binary (for the image)
        uses: actions/upload-artifact@v4
        with:
          name: 2cha-reality-bin-${{ matrix.docker_arch }}
          path: target/${{ matrix.target }}/release/2cha

  docker:
    name: Build + push container image
    needs: [build-reality]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download REALITY binaries
        uses: actions/download-artifact@v4
        with:
          pattern: 2cha-reality-bin-*
          path: bins
      - name: Stage binaries for Docker
        run: |
          mkdir -p dist/amd64 dist/arm64
          cp bins/2cha-reality-bin-amd64/2cha dist/amd64/2cha
          cp bins/2cha-reality-bin-arm64/2cha dist/arm64/2cha
          chmod +x dist/amd64/2cha dist/arm64/2cha
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image ref
        id: meta
        run: |
          repo=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$repo:${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tag }}

  release:
    name: Create Release
    needs: [build-linux, build-reality]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
