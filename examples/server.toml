# 2cha VPN Server Configuration v1.0
# Usage: sudo 2cha server -c server.toml

[server]
listen = "0.0.0.0:51820"
# listen_v6 = "[::]:51820"
max_clients = 256

[tun]
name = "tun0"
mtu = 1420
queue_len = 500

[crypto]
cipher = "chacha20-poly1305"
# Generate with: 2cha genkey /etc/2cha/server.key
private_key_file = "/etc/2cha/server.key"

# Authorized clients. Get a client's key with: 2cha pubkey client.key
[[peers]]
public_key = "CLIENT_PUBLIC_KEY_BASE64"
name = "laptop"

# ─────────────────────────────────────────────────────────────────────────────
# IPv4 Configuration
# ─────────────────────────────────────────────────────────────────────────────
[ipv4]
enable = true
address = "10.0.0.1"
prefix = 24
allowed_ips = []
blocked_ips = []
push_routes = []

# ─────────────────────────────────────────────────────────────────────────────
# IPv6 Configuration
# ─────────────────────────────────────────────────────────────────────────────
[ipv6]
enable = false
address = "fd00:2cha::1"
prefix = 64
allowed_ips = []
blocked_ips = []
push_routes = []

# ─────────────────────────────────────────────────────────────────────────────
# Gateway Mode
# ─────────────────────────────────────────────────────────────────────────────
[gateway]
ip_forward = false
ip6_forward = false
masquerade_v4 = false
masquerade_v6 = false
external_interface = "eth0"

# ─────────────────────────────────────────────────────────────────────────────
# Performance Tuning
# ─────────────────────────────────────────────────────────────────────────────
[performance]
socket_recv_buffer = 2097152
socket_send_buffer = 2097152
batch_size = 32
multi_queue = false
cpu_affinity = []

[timeouts]
# Drop a client session after this many seconds without traffic
session = 180

[logging]
level = "info"
# file = "/var/log/2cha.log"
